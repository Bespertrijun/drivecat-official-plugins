<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>批量重命名</title>
<style>
  /* ── 默认变量（fallback，宿主通过 SDK 自动覆盖） ── */
  :root {
    --dc-primary: #6c63ff;
    --dc-primary-hover: #5a52d5;
    --dc-bg-card: #16213e;
    --dc-bg-elevated: #1e2d4a;
    --dc-bg-surface: #1a1a2e;
    --dc-text-primary: #e0e0e0;
    --dc-text-secondary: #c0c0c0;
    --dc-text-tertiary: #999;
    --dc-border: #333;
    --dc-error: #e53e3e;
    --dc-success: #38a169;
    --dc-warning: #d69e2e;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--dc-bg-surface);
    color: var(--dc-text-primary);
    padding: 16px;
    font-size: 14px;
  }
  h3 { font-size: 15px; font-weight: 600; margin-bottom: 12px; }
  .section { margin-bottom: 16px; }
  label { display: block; font-size: 12px; color: var(--dc-text-tertiary); margin-bottom: 4px; }
  input, select {
    width: 100%; padding: 8px 10px;
    border: 1px solid var(--dc-border); border-radius: 6px;
    background: var(--dc-bg-card); color: var(--dc-text-primary);
    font-size: 13px; outline: none;
  }
  input:focus, select:focus { border-color: var(--dc-primary); }
  .row { display: flex; gap: 8px; margin-bottom: 8px; align-items: flex-end; }
  .row > * { flex: 1; }
  .btn {
    padding: 8px 16px; border: none; border-radius: 6px;
    cursor: pointer; font-size: 13px; font-weight: 500; transition: background 0.15s;
  }
  .btn-primary { background: var(--dc-primary); color: #fff; }
  .btn-primary:hover { background: var(--dc-primary-hover); }
  .btn-secondary { background: var(--dc-bg-elevated); color: var(--dc-text-secondary); border: 1px solid var(--dc-border); }
  .btn-secondary:hover { opacity: 0.85; }
  .btn-sm { padding: 5px 10px; font-size: 12px; }
  .actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
  .rule-card {
    background: var(--dc-bg-card); border: 1px solid var(--dc-border);
    border-radius: 8px; padding: 12px; margin-bottom: 8px; position: relative;
  }
  .rule-card .remove {
    position: absolute; top: 8px; right: 8px;
    background: none; border: none; color: var(--dc-error); cursor: pointer; font-size: 16px;
  }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; padding: 6px 8px; border-bottom: 1px solid var(--dc-border); color: var(--dc-text-tertiary); font-weight: 500; }
  td { padding: 6px 8px; border-bottom: 1px solid var(--dc-border); color: var(--dc-text-secondary); }
  .changed { color: var(--dc-primary); font-weight: 500; }
  .status { text-align: center; padding: 20px; color: var(--dc-text-tertiary); }
  .loading { opacity: 0.6; pointer-events: none; }
  #scope-hint {
    font-size: 12px; color: var(--dc-text-tertiary); margin-bottom: 8px;
    padding: 6px 10px; background: var(--dc-bg-card);
    border-radius: 6px; border: 1px solid var(--dc-border);
  }
  #scope-hint .scope-label { color: var(--dc-primary); font-weight: 500; }
</style>
</head>
<body>
  <div id="app">
    <div id="scope-hint"></div>

    <div class="section">
      <h3>重命名规则</h3>
      <div id="rules-list"></div>
      <div class="row">
        <select id="new-rule-type">
          <option value="replace">查找替换</option>
          <option value="regex">正则替换</option>
          <option value="insert">插入文本</option>
          <option value="delete">删除字符</option>
          <option value="sequence">添加序号</option>
          <option value="pad">数字补零</option>
          <option value="case">大小写</option>
          <option value="date">添加日期</option>
        </select>
        <button class="btn btn-secondary btn-sm" onclick="addRule()">+ 添加规则</button>
      </div>
    </div>

    <div class="actions">
      <button class="btn btn-secondary" onclick="doPreview()">预览</button>
      <button class="btn btn-primary" onclick="doExecute()">执行重命名</button>
    </div>

    <div class="section" style="margin-top:16px">
      <h3>预览结果</h3>
      <div id="preview-area"><div class="status">添加规则后点击「预览」</div></div>
    </div>
  </div>

<!-- 引用共享 SDK -->
<script src="../_shared/sdk.js"></script>
<script>
// ── State ──
var rules = []
var driveId = 0
var parentId = '0'
var selectedFiles = []
var scopeMode = 'dir'

DriveCat.onInit(function (ctx) {
  driveId = ctx.drive_id
  parentId = ctx.parent_id || '0'

  var selected = ctx.selected_file
  var hint = document.getElementById('scope-hint')

  if (selected && selected.is_dir) {
    parentId = selected.id
    scopeMode = 'dir'
    selectedFiles = []
    hint.innerHTML = '<span class="scope-label">作用范围</span>：文件夹 <b>' + esc(selected.name) + '</b> 内的所有文件'
  } else if (selected) {
    scopeMode = 'files'
    selectedFiles = [selected.id]
    hint.innerHTML = '<span class="scope-label">作用范围</span>：选中的文件 <b>' + esc(selected.name) + '</b>'
  } else {
    scopeMode = 'dir'
    selectedFiles = []
    hint.innerHTML = '<span class="scope-label">作用范围</span>：当前目录（ID: ' + parentId + '）内的所有文件'
  }

  DriveCat.resize()
})

// ── Rule UI ──
var RULE_FIELDS = {
  replace: [
    { key:'pattern', label:'查找', placeholder:'要替换的文本' },
    { key:'replacement', label:'替换为', placeholder:'新文本' },
  ],
  regex: [
    { key:'pattern', label:'正则', placeholder:'例: (\\\\d+)' },
    { key:'replacement', label:'替换为', placeholder:'例: EP$1' },
    { key:'flags', label:'标志', placeholder:'i/m/s', small:true },
  ],
  insert: [
    { key:'text', label:'文本', placeholder:'要插入的文本' },
    { key:'position', label:'位置', placeholder:'0=开头 -1=末尾', type:'number' },
  ],
  delete: [
    { key:'target', label:'目标', placeholder:'要删除的文本' },
  ],
  sequence: [
    { key:'start_num', label:'起始', placeholder:'1', type:'number', small:true },
    { key:'step', label:'步长', placeholder:'1', type:'number', small:true },
    { key:'padding', label:'补零', placeholder:'3', type:'number', small:true },
  ],
  pad: [
    { key:'target_digits', label:'位数', placeholder:'3', type:'number' },
  ],
  case: [
    { key:'case_type', label:'类型', options:['lower','upper','title','capitalize','swap'] },
  ],
  date: [
    { key:'format', label:'格式', placeholder:'%Y%m%d' },
    { key:'position', label:'位置', placeholder:'0=开头 -1=末尾', type:'number', small:true },
  ],
}

var RULE_LABELS = {
  replace:'查找替换', regex:'正则替换', insert:'插入文本', delete:'删除字符',
  sequence:'添加序号', pad:'数字补零', case:'大小写', date:'添加日期',
}

function addRule() {
  var type = document.getElementById('new-rule-type').value
  rules.push({ type: type, params: {} })
  renderRules()
}

function removeRule(idx) {
  rules.splice(idx, 1)
  renderRules()
}

function renderRules() {
  var list = document.getElementById('rules-list')
  if (rules.length === 0) {
    list.innerHTML = '<div class="status" style="padding:10px">暂无规则，请添加</div>'
    DriveCat.resize()
    return
  }
  var html = ''
  rules.forEach(function (rule, i) {
    var fields = RULE_FIELDS[rule.type] || []
    html += '<div class="rule-card"><button class="remove" onclick="removeRule(' + i + ')">×</button>'
    html += '<label style="color:var(--dc-primary);font-weight:500;margin-bottom:6px">' + RULE_LABELS[rule.type] + '</label><div class="row">'
    fields.forEach(function (f) {
      var val = rule.params[f.key] || ''
      var style = f.small ? 'max-width:80px' : ''
      if (f.options) {
        html += '<div style="' + style + '"><label>' + f.label + '</label><select onchange="updateParam(' + i + ',\'' + f.key + '\',this.value)">'
        f.options.forEach(function (o) { html += '<option value="' + o + '"' + (val === o ? ' selected' : '') + '>' + o + '</option>' })
        html += '</select></div>'
      } else {
        html += '<div style="' + style + '"><label>' + f.label + '</label><input type="' + (f.type || 'text') + '" placeholder="' + (f.placeholder || '') + '" value="' + val + '" onchange="updateParam(' + i + ',\'' + f.key + '\',this.value)"></div>'
      }
    })
    html += '</div></div>'
  })
  list.innerHTML = html
  DriveCat.resize()
}

function updateParam(idx, key, val) {
  rules[idx].params[key] = val
}

// ── API calls ──
function getRuleSpecs() {
  return rules.map(function (r) {
    var params = {}
    for (var k in r.params) { params[k] = r.params[k] }
    for (var k2 in params) {
      if (typeof params[k2] === 'string' && /^-?\d+$/.test(params[k2])) {
        params[k2] = parseInt(params[k2], 10)
      }
    }
    return { type: r.type, params: params }
  })
}

function buildRequestBody() {
  var body = {
    drive_config_id: driveId,
    parent_id: parentId,
    rules: getRuleSpecs(),
  }
  if (scopeMode === 'files' && selectedFiles.length > 0) {
    body.file_ids = selectedFiles
  }
  return body
}

function doPreview() {
  if (rules.length === 0) { DriveCat.toast('请先添加规则', 'error'); return }
  var area = document.getElementById('preview-area')
  area.innerHTML = '<div class="status">加载中…</div>'

  DriveCat.api('POST', '/rename/preview', buildRequestBody())
    .then(function (res) {
      var previews = res.previews || []
      if (previews.length === 0) {
        area.innerHTML = '<div class="status">没有匹配的文件</div>'
        return
      }
      var html = '<table><tr><th>原文件名</th><th>新文件名</th></tr>'
      previews.forEach(function (p) {
        var cls = p.original_name !== p.new_name ? 'changed' : ''
        html += '<tr><td>' + esc(p.original_name) + '</td><td class="' + cls + '">' + esc(p.new_name) + '</td></tr>'
      })
      html += '</table>'
      area.innerHTML = html
      DriveCat.resize()
    })
    .catch(function (e) {
      area.innerHTML = '<div class="status" style="color:var(--dc-error)">预览失败: ' + e.message + '</div>'
      DriveCat.resize()
    })
}

function doExecute() {
  if (rules.length === 0) { DriveCat.toast('请先添加规则', 'error'); return }
  var scopeText = scopeMode === 'files'
    ? '确定对选中的 ' + selectedFiles.length + ' 个文件执行重命名？'
    : '确定对目录内所有文件执行批量重命名？'
  if (!confirm(scopeText + ' 此操作不可撤销。')) return

  document.getElementById('app').classList.add('loading')
  DriveCat.api('POST', '/rename/execute', buildRequestBody())
    .then(function (res) {
      var total = res.total || 0
      var success = res.success || 0
      var failed = res.failed || 0
      DriveCat.toast(
        '重命名完成：' + success + '/' + total + ' 成功' + (failed > 0 ? '，' + failed + ' 失败' : ''),
        failed > 0 ? 'warning' : 'success'
      )
      DriveCat.close()
    })
    .catch(function (e) {
      DriveCat.toast('执行失败: ' + e.message, 'error')
    })
    .finally(function () {
      document.getElementById('app').classList.remove('loading')
    })
}

function esc(s) {
  var d = document.createElement('div')
  d.textContent = s
  return d.innerHTML
}

renderRules()
</script>
</body>
</html>
