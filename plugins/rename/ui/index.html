<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>批量重命名</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <!-- ====== 步骤导航 ====== -->
    <div class="steps-bar">
      <div class="step active" data-step="1"><span class="step-num">1</span> 选择目标</div>
      <div class="step-line"></div>
      <div class="step" data-step="2"><span class="step-num">2</span> 配置规则</div>
      <div class="step-line"></div>
      <div class="step" data-step="3"><span class="step-num">3</span> 执行</div>
    </div>

    <!-- ====== Step 1: 选择目标 ====== -->
    <div id="step-1" class="step-panel active">
      <div class="panel-header">
        <h2>选择目标文件</h2>
        <p class="hint">选择要重命名的网盘、目录或文件</p>
      </div>

      <!-- 网盘选择 -->
      <div class="control-group">
        <label>网盘</label>
        <select id="drive-select"><option value="">加载中...</option></select>
      </div>

      <!-- 路径面包屑 -->
      <div class="breadcrumb" id="breadcrumb">
        <span class="crumb" data-id="0">根目录</span>
      </div>

      <!-- 文件列表 -->
      <div class="file-list" id="file-list">
        <div class="status-msg">请先选择网盘</div>
      </div>

      <!-- 已选文件提示 -->
      <div class="selection-info" id="selection-info" style="display:none">
        <span id="selection-text"></span>
        <button class="btn-link" onclick="App.clearSelection()">清除</button>
      </div>

      <div class="step-actions">
        <div></div>
        <button class="btn btn-primary" onclick="App.goStep(2)">下一步 →</button>
      </div>
    </div>

    <!-- ====== Step 2: 配置规则 ====== -->
    <div id="step-2" class="step-panel">
      <div class="panel-header">
        <h2>配置重命名规则</h2>
        <p class="hint" id="step2-scope"></p>
      </div>

      <!-- 模板区 -->
      <div class="template-bar">
        <select id="template-select"><option value="">— 选择模板 —</option></select>
        <button class="btn btn-sm btn-secondary" onclick="App.loadTemplate()">加载</button>
        <button class="btn btn-sm btn-secondary" onclick="App.saveTemplate()">保存当前</button>
      </div>

      <!-- 规则列表 -->
      <div id="rules-list"></div>

      <!-- 添加规则 -->
      <div class="add-rule-row">
        <select id="new-rule-type">
          <option value="replace">查找替换</option>
          <option value="regex">正则替换</option>
          <option value="insert">插入文本</option>
          <option value="delete">删除字符</option>
          <option value="sequence">添加序号</option>
          <option value="pad">数字补零</option>
          <option value="case">大小写转换</option>
          <option value="date">添加日期</option>
        </select>
        <button class="btn btn-sm btn-secondary" onclick="App.addRule()">+ 添加规则</button>
      </div>

      <!-- 预览区 -->
      <div class="preview-section">
        <h3>预览</h3>
        <div id="preview-area"><div class="status-msg">添加规则后自动预览</div></div>
      </div>

      <div class="step-actions">
        <button class="btn btn-secondary" onclick="App.goStep(1)">← 上一步</button>
        <button class="btn btn-primary" onclick="App.goStep(3)">下一步 →</button>
      </div>
    </div>

    <!-- ====== Step 3: 执行 ====== -->
    <div id="step-3" class="step-panel">
      <div class="panel-header">
        <h2>执行重命名</h2>
        <p class="hint" id="step3-scope"></p>
      </div>

      <!-- 最终预览区 -->
      <div class="execution-preview" id="execution-preview">
        <div class="status-msg">正在加载最终预览...</div>
      </div>

      <!-- 流控（批次大小 + 批间暂停） -->
      <div class="flow-control-row">
        <div class="control-group inline">
          <label>批次并发数</label>
          <input type="number" id="concurrency" value="10" min="1" max="50">
          <span class="hint">每批同时执行的重命名数量</span>
        </div>
        <div class="control-group inline">
          <label>批间暂停 (ms)</label>
          <input type="number" id="pause-ms" value="1000" min="0" max="60000" step="100">
          <span class="hint">每批完成后的等待时长，0 表示不停顿</span>
        </div>
      </div>

      <!-- 进度区 -->
      <div class="progress-section" id="progress-section" style="display:none">
        <div class="progress-bar-track">
          <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
        </div>
        <div class="progress-stats" id="progress-stats">0 / 0</div>
        <div class="progress-log" id="progress-log"></div>
      </div>

      <div class="step-actions">
        <button class="btn btn-secondary" id="btn-back-2" onclick="App.goStep(2)">← 上一步</button>
        <button class="btn btn-primary" id="btn-execute" onclick="App.doExecute()">🚀 开始重命名</button>
      </div>
    </div>
    <!-- ====== 模态框 ====== -->
    <div id="modal-overlay" class="modal-overlay" style="display:none">
      <div class="modal-content">
        <h3>保存模板</h3>
        <p class="hint">请输入新模板的名称：</p>
        <input type="text" id="modal-input" placeholder="例如：动漫去除前缀" autocomplete="off" />
        <div class="modal-actions">
          <button class="btn btn-secondary" onclick="App.closeModal()">取消</button>
          <button class="btn btn-primary" onclick="App.confirmModal()">保存</button>
        </div>
      </div>
    </div>
  </div>

  <script src="../_shared/sdk.js"></script>
  <script src="app.js"></script>
</body>
</html>
